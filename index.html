<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekhanenin — খাঁটি মসলার ঘর</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@500;700;900&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#C9822A;
    --red:#A62D20;
    --green:#2F3B2A;
    --cream:#FBF3E7;
    --ink:#211A14;
    --line:#f0e6d6;
    --line2:#e5d9c5;
    --muted:#8a7c68;
    --muted2:#665c4f;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans Bengali',sans-serif;background:var(--cream);color:var(--ink);}
  h1,h2,h3{font-family:'Noto Serif Bengali',serif;margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  img{max-width:100%;display:block;}
  ::selection{background:var(--gold);color:var(--cream);}
  a{color:inherit;text-decoration:none;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* Nav */
  header.topnav{position:sticky;top:0;z-index:40;background:var(--ink);border-bottom:3px solid var(--gold);}
  .navwrap{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .brand-badge{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-size:18px;}
  .brand-name{font-family:'Noto Serif Bengali',serif;font-weight:900;font-size:22px;color:var(--cream);line-height:1;}
  .brand-tag{font-size:10px;color:var(--gold);letter-spacing:1px;margin-top:2px;}
  nav.navlinks{display:flex;gap:6px;flex-wrap:wrap;}
  .navbtn{background:transparent;color:var(--cream);border:1px solid #4a3e30;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .15s;}
  .navbtn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}

  /* Sections */
  section.page{max-width:1100px;margin:0 auto;padding:40px 20px 70px;}
  .eyebrow{font-size:12px;letter-spacing:2px;color:var(--red);font-weight:700;}
  .section-title{font-size:30px;font-weight:900;margin-top:6px;}
  .section-rule{width:60px;height:4px;background:var(--gold);border-radius:2px;margin-top:12px;}

  /* Hero */
  .hero{background:linear-gradient(180deg,var(--ink) 0%, var(--green) 100%);padding:50px 20px 70px;position:relative;overflow:hidden;}
  .hero-emoji{position:absolute;right:-40px;top:-20px;font-size:220px;opacity:.06;transform:rotate(12deg);}
  .hero-inner{max-width:1100px;margin:0 auto;position:relative;}
  .ref-pill{display:inline-block;background:#C9822A22;border:1px solid var(--gold);color:var(--gold);padding:6px 14px;border-radius:20px;font-size:12px;margin-bottom:18px;}
  .hero-kicker{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:12px;}
  .hero h1{font-size:clamp(30px,6vw,54px);color:var(--cream);line-height:1.15;max-width:700px;animation:fadeUp .6s ease;}
  .hero p{color:#d8cdbc;font-size:16px;max-width:520px;margin-top:18px;line-height:1.7;}
  .hero-stats{display:flex;gap:24px;margin-top:34px;flex-wrap:wrap;}
  .mini-stat-value{color:var(--gold);font-weight:900;font-size:22px;font-family:'Noto Serif Bengali',serif;}
  .mini-stat-label{color:#a99b87;font-size:12px;}

  /* Products grid */
  .grid-products{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;margin-top:30px;}
  .pcard{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(33,26,20,.08);border:1px solid var(--line);}
  .pcard-img{height:170px;overflow:hidden;position:relative;}
  .pcard-img img{width:100%;height:100%;object-fit:cover;}
  .pcard-tag{position:absolute;top:10px;left:10px;background:var(--green);color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;}
  .pcard-body{padding:18px;}
  .pcard-body h3{font-size:20px;margin-bottom:6px;font-weight:700;}
  .pcard-desc{font-size:13px;color:var(--muted2);margin:0 0 14px;line-height:1.6;min-height:40px;}
  .weight-box{background:var(--cream);border-radius:10px;padding:12px;margin-bottom:12px;}
  .weight-label{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .weight-opts{display:flex;gap:6px;flex-wrap:wrap;}
  .wbtn{padding:5px 10px;border-radius:8px;border:1.5px solid var(--line2);background:#fff;color:var(--ink);font-size:12px;font-weight:600;}
  .wbtn.sel{border-color:var(--gold);background:var(--gold);color:#fff;}
  .price-row{display:flex;align-items:baseline;justify-content:space-between;margin-top:12px;}
  .price-row .lbl{font-size:12px;color:var(--muted);}
  .price-row .val{font-family:'Noto Serif Bengali',serif;font-size:24px;font-weight:900;color:var(--red);}
  .buy-btn{width:100%;background:var(--ink);color:var(--cream);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}

  /* Trust strip */
  .trust{background:var(--green);}
  .trust-inner{max-width:1100px;margin:0 auto;padding:36px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
  .trust-item{display:flex;gap:12px;align-items:flex-start;}
  .trust-icon{font-size:26px;}
  .trust-title{color:var(--cream);font-weight:700;font-size:14px;}
  .trust-desc{color:#a9b5a3;font-size:12px;margin-top:2px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(33,26,20,.6);z-index:60;display:none;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:18px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease;}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;}
  .modal-body{padding:22px;}
  .prod-mini{display:flex;gap:12px;align-items:center;margin-bottom:18px;}
  .prod-mini img{width:56px;height:56px;border-radius:10px;object-fit:cover;}
  .field-label{font-size:12px;color:var(--muted2);font-weight:600;display:block;margin-bottom:5px;margin-top:12px;}
  .field-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line2);border-radius:10px;padding:10px 12px;}
  .field-box input,.field-box textarea{border:none;outline:none;flex:1;font-size:14px;background:transparent;width:100%;}
  .icon-sm{color:var(--gold);font-size:14px;}
  .total-box{background:var(--cream);padding:12px;border-radius:10px;margin-bottom:18px;display:flex;justify-content:space-between;}
  .total-box strong{color:var(--red);font-family:'Noto Serif Bengali',serif;font-size:20px;}
  .ref-note{font-size:12px;color:var(--green);background:#e8f0e5;padding:10px;border-radius:8px;margin-top:6px;}
  .submit-btn{width:100%;margin-top:18px;background:var(--red);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;}
  .submit-btn:disabled{opacity:.6;}
  .cod-note{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;}
  .weight-opts-modal{display:flex;gap:6px;margin-bottom:14px;}
  .weight-opts-modal .wbtn{flex:1;padding:8px 4px;text-align:center;}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:28px;}
  .stat-card{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--line);}
  .stat-card.accent{background:var(--ink);color:#fff;border:none;}
  .stat-icon{color:var(--red);margin-bottom:8px;font-size:18px;}
  .stat-card.accent .stat-icon{color:var(--gold);}
  .stat-value{font-size:22px;font-weight:900;font-family:'Noto Serif Bengali',serif;}
  .stat-label{font-size:12px;opacity:.7;margin-top:2px;}

  /* Referral page */
  .tabs{display:flex;gap:8px;margin-top:24px;margin-bottom:0;background:#fff;padding:4px;border-radius:12px;border:1px solid var(--line);width:fit-content;}
  .tabbtn{border:none;padding:9px 16px;border-radius:9px;font-size:12.5px;font-weight:700;background:transparent;color:var(--muted2);}
  .tabbtn.active{background:var(--ink);color:#fff;}
  .panel-box{margin-top:22px;background:#fff;padding:20px;border-radius:14px;border:1px solid var(--line);}
  .link-row{display:flex;gap:8px;flex-wrap:wrap;}
  .link-row input{flex:1;min-width:200px;border:1.5px solid var(--line2);border-radius:8px;padding:10px 12px;font-size:13px;background:var(--cream);}
  .copy-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;}
  .copy-btn.copied{background:var(--green);}
  .order-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .order-row .oleft strong{font-size:14px;}
  .order-row .oleft .osub{font-size:12px;color:var(--muted);}
  .order-row .oright{text-align:right;}
  .empty-state{text-align:center;padding:30px 20px;background:#fff;border-radius:12px;border:1px dashed var(--line2);color:var(--muted);font-size:13px;}

  /* Admin */
  .login-box{max-width:380px;margin:60px auto;padding:0 20px;}
  .login-card{background:#fff;border-radius:16px;padding:28px;border:1px solid var(--line);text-align:center;}
  .login-badge{width:50px;height:50px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:20px;}
  .login-card p{font-size:12px;color:var(--muted);margin:0 0 18px;}
  .login-field{display:flex;align-items:center;border:1.5px solid var(--line2);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
  .login-field input{border:none;outline:none;flex:1;font-size:14px;}
  .login-btn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;}
  .admin-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .logout-btn{display:flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line2);border-radius:20px;padding:8px 14px;font-size:12px;color:var(--red);font-weight:700;}
  .admintabs{display:flex;gap:8px;margin:24px 0;background:#fff;padding:4px;border-radius:12px;border:1px solid var(--line);width:fit-content;flex-wrap:wrap;}
  .order-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px;font-size:13px;background:var(--cream);padding:12px;border-radius:10px;}
  .order-detail span.k{color:var(--muted);}
  .order-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px;}
  .order-card-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .status-select{border:1.5px solid var(--line2);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;height:fit-content;}
  .grid-admin-products{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
  .aprod-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
  .aprod-card img{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
  .aprod-name{font-weight:700;font-size:15px;}
  .aprod-price{font-size:13px;color:var(--muted);margin:4px 0;}
  .edit-btn{margin-top:8px;display:flex;align-items:center;gap:6px;background:var(--cream);border:1px solid var(--line2);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;}
  .save-cancel{display:flex;gap:8px;margin-top:12px;}
  .save-btn{flex:1;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;font-size:12px;}
  .cancel-btn{flex:1;background:#fff;color:var(--red);border:1px solid var(--line2);border-radius:8px;padding:10px;font-weight:700;font-size:12px;}
  .input-basic{width:100%;border:1.5px solid var(--line2);border-radius:8px;padding:8px 10px;font-size:13px;margin-bottom:4px;}
  .referrer-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;}

  /* Footer */
  footer{background:var(--ink);color:#a99b87;padding:30px 20px;text-align:center;font-size:12px;}
  .footer-brand{font-family:'Noto Serif Bengali',serif;color:var(--cream);font-size:18px;font-weight:900;margin-bottom:6px;}

  /* Toast */
  #toast{position:fixed;bottom:20px;right:20px;left:20px;max-width:360px;margin-left:auto;background:var(--ink);color:#fff;padding:14px 18px;border-radius:12px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;animation:fadeUp .3s ease;}

  .hidden{display:none !important;}
</style>
</head>

function loadDB(){
  let products = JSON.parse(localStorage.getItem("ekh_products") || "null");
  if(!products){ products = DEFAULT_PRODUCTS; localStorage.setItem("ekh_products", JSON.stringify(products)); }
  let orders = JSON.parse(localStorage.getItem("ekh_orders") || "[]");
  let referrers = JSON.parse(localStorage.getItem("ekh_referrers") || "{}");
  return { products, orders, referrers };
}
function saveProducts(p){ localStorage.setItem("ekh_products", JSON.stringify(p)); DB.products = p; }
function saveOrders(o){ localStorage.setItem("ekh_orders", JSON.stringify(o)); DB.orders = o; }
function saveReferrers(r){ localStorage.setItem("ekh_referrers", JSON.stringify(r)); DB.referrers = r; }

let DB = loadDB();
let ADMIN_AUTHED = sessionStorage.getItem("ekh_admin_authed") === "1";
let currentRoute = "home";
let refCode = null;
{
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if(ref) refCode = ref.toUpperCase();
}

/* Secret admin entry: click the "·" at the very end of the footer copyright line 5 times within 3 seconds */
let _adminClickCount = 0;
let _adminClickTimer = null;
function handleAdminTrigger(){
  _adminClickCount++;
  clearTimeout(_adminClickTimer);
  _adminClickTimer = setTimeout(()=>{ _adminClickCount = 0; }, 3000);
  if(_adminClickCount >= 5){
    _adminClickCount = 0;
    goRoute("admin");
  }
}

function money(n){ return "৳" + Math.round(n).toLocaleString("en-IN"); }
function genCode(seed){
  const s = (seed || Math.random().toString(36)) + Date.now();
  let hash = 0;
  for(let i=0;i<s.length;i++) hash = (hash*31 + s.charCodeAt(i)) >>> 0;
  return "REF" + (hash % 900000 + 100000);
}
function genOrderId(){ return "EKH" + Date.now().toString().slice(-8); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ t.style.display="none"; }, 2600);
}

/* ================= ROUTER ================= */
function goRoute(route){
  currentRoute = route;
  document.getElementById("nav-home").classList.toggle("active", route==="home");
  document.getElementById("nav-refer").classList.toggle("active", route==="refer");
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

function render(){
  const root = document.getElementById("app-root");
  if(currentRoute === "home") root.innerHTML = renderHome();
  else if(currentRoute === "refer") root.innerHTML = renderRefer();
  else if(currentRoute === "admin") root.innerHTML = renderAdmin();
  attachHomeListeners();
}

function renderProductCard(p){
  const w = selectedWeights[p.id];
  const price = (p.pricePerKg/1000) * w;
  return `
    <div class="pcard">
      <div class="pcard-img">
        <img src="${esc(p.image)}" alt="${esc(p.name)}">
        <div class="pcard-tag">${esc(p.tagline)}</div>
      </div>
      <div class="pcard-body">
        <h3>${esc(p.name)}</h3>
        <p class="pcard-desc">${esc(p.desc)}</p>
        <div class="weight-box">
          <div class="weight-label">পরিমাণ বাছাই করুন</div>
          <div class="weight-opts">
            ${WEIGHT_OPTIONS.map(wo => `
              <button class="wbtn ${wo===w?'sel':''}" onclick="setCardWeight('${p.id}', ${wo})">
                ${wo>=1000 ? "১ কেজি" : wo+" গ্রাম"}
              </button>
            `).join("")}
          </div>

        <button class="submit-btn" id="submit-order-btn" onclick="submitOrder()">ক্যাশ অন ডেলিভারিতে অর্ডার করুন</button>

function setModalWeight(w){
  checkoutState.weight = w;
  renderCheckoutModal();
}
function submitOrder(){
  const p = DB.products.find(x=>x.id===checkoutState.productId);
  const w = checkoutState.weight;
  const price = (p.pricePerKg/1000)*w;

  const name = document.getElementById("f-name").value.trim();
  const village = document.getElementById("f-village").value.trim();
  const district = document.getElementById("f-district").value.trim();
  const postOffice = document.getElementById("f-post").value.trim();
  const mobile = document.getElementById("f-mobile").value.trim();

  if(!name || !village || !district || !postOffice || !mobile){
    showToast("সব ঘর পূরণ করুন");
    return;
  }
  if(!/^0\d{10}$/.test(mobile)){
    showToast("সঠিক মোবাইল নম্বর দিন (০১xxxxxxxxx)");
    return;
  }

  const btn = document.getElementById("submit-order-btn");
  btn.disabled = true; btn.textContent = "অপেক্ষা করুন...";

  const commission = (refCode && DB.referrers[refCode]) ? price*COMMISSION_RATE : 0;
  const order = {
    id: genOrderId(),
    productId: p.id,
    productName: p.name,
    weight: w,
    price: price,
    customer: { name, village, district, postOffice, mobile },
    refCode: refCode || null,
    commission: commission,
    status: "নতুন",
    createdAt: new Date().toISOString()
  };
  const next = [order, ...DB.orders];
  saveOrders(next);
  notifyAdminByEmail(order);

  setTimeout(()=>{
    showToast("✅ অর্ডার সফল হয়েছে! ধন্যবাদ, " + name);
    closeCheckout();
  }, 300);
}

const NOTIFY_EMAIL = "jsreflect74@gmail.com";
const WEB3FORMS_ACCESS_KEY = "0757faa7-33f1-4add-bc36-6a6888b2be63";
function notifyAdminByEmail(order){
  const weightLabel = order.weight>=1000 ? "১ কেজি" : order.weight+" গ্রাম";
  const payload = {
    access_key: WEB3FORMS_ACCESS_KEY,
    subject: "🛍️ নতুন অর্ডার এসেছে — " + order.id,
    from_name: "Ekhanenin অর্ডার সিস্টেম",

    "গ্রাম": order.customer.village,

    <input class="input-basic" id="edit-image-${p.id}" value="${esc(p.image)}">
    <label class="field-label">বিবরণ</label>
    <textarea class="input-basic" id="edit-desc-${p.id}" style="min-height:60px;resize:vertical;">${esc(p.desc)}</textarea>
    <div class="save-cancel">
      <button class="save-btn" onclick="saveProductEdit('${p.id}')">সংরক্ষণ করুন</button>
      <button class="cancel-btn" onclick="editingProductId=null; render();">বাতিল</button>
    </div>
  `;
}

function saveProductEdit(id){
  const name = document.getElementById(`edit-name-${id}`).value.trim();
  const price = Number(document.getElementById(`edit-price-${id}`).value);
  const image = document.getElementById(`edit-image-${id}`).value.trim();
  const desc = document.getElementById(`edit-desc-${id}`).value.trim();
  const next = DB.products.map(p => p.id===id ? {...p, name, pricePerKg:price, image, desc} : p);
  saveProducts(next);
  editingProductId = null;
  render();
  showToast("প্রোডাক্ট আপডেট হয়েছে");
}

function renderReferrersTab(){
  const list = Object.values(DB.referrers);
  if(list.length === 0) return `<div class="empty-state">এখনো কোনো রেফারার নেই।</div>`;
  return list.map(r => {
    const myOrders = DB.orders.filter(o => o.refCode === r.code);
    const commission = myOrders.reduce((s,o)=>s+o.commission,0);
    return `
      <div class="referrer-row">
        <div>
          <div style="font-weight:700;">${esc(r.name)}</div>
          <div style="font-size:12px;color:var(--muted);">${esc(r.phone)} · কোড: ${esc(r.code)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:var(--muted);">${myOrders.length}টি অর্ডার</div>
          <div style="font-weight:900;color:var(--green);">${money(commission)}</div>
        </div>
      </div>
    `;
  }).join("");
}

/* ================= INIT ================= */
goRoute('home');
</script>
</body>
</html>
